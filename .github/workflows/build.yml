on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (if needed)
        run: rustup update

      - name: Build release
        run: cargo test --release
        env:
          RUST_BACKTRACE: full

      - name: Build package
        if: matrix.os == 'ubuntu-latest'
        run: tar --no-same-owner -czf jlo-linux.tar.gz jlo-init.sh -C target/release jlo-bin

      - name: Build package
        if: matrix.os == 'macos-latest'
        run: tar --no-same-owner -czf jlo-macos.tar.gz jlo-init.sh -C target/release jlo-bin

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifact
          path: jlo-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: .
      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test
          files: jlo-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
